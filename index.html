<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Utopia Wildflowers Softball</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
:root{
--green:#2d5a27;
--green-lt:#3f7a38;
--green-dk:#1a3615;
--sage:#7a9e6f;
--gold:#c9973a;
--wheat:#e8c97a;
--cream:#fdf8f0;
--bark:#3a2a1e
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
font-family:"Nunito",sans-serif;
background:var(--cream);
color:var(--bark);
overflow-x:hidden
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:.85rem 2rem;
background:rgba(26,54,21,.96);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(232,201,122,.25)
}

.nav-logo{
font-family:"Playfair Display",serif;
font-size:1.2rem;
font-weight:700;
color:var(--wheat);
text-decoration:none
}

.nav-links{
display:flex;
gap:.2rem;
list-style:none
}

.nav-links a{
color:rgba(255,255,255,.78);
text-decoration:none;
font-weight:700;
font-size:.82rem;
padding:.4rem .85rem;
border-radius:50px;
transition:background .2s
}

.nav-links a:hover{
background:rgba(255,255,255,.1);
color:var(--wheat)
}

@media(max-width:750px){
.nav-links{display:none}
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(26,54,21,.7), rgba(26,54,21,.7));
color:white;
padding-top:60px;
}

.hero h1{
font-family:"Playfair Display",serif;
font-size:2.5rem;
}

/* SECTION */
.section{
padding:80px 20px;
text-align:center;
}

h2{
font-family:"Playfair Display",serif;
color:var(--green);
margin-bottom:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">Wildflowers Softball</a>

  <ul class="nav-links">
    <li><a href="#home">Home</a></li>
    <li><a href="#schedule">Schedule</a></li>
    <li><a href="#roster">Roster</a></li>

    <!-- 🔥 ADDED STATS LINK -->
    <li><a href="stats.html">Stats</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="home" class="hero">
  <h1>🌸 Utopia Wildflowers Softball</h1>
</section>

<!-- SCHEDULE -->
<section id="schedule" class="section">
  <h2>Schedule</h2>
  <p>Add your game schedule here</p>
</section>

<!-- ROSTER -->
<section id="roster" class="section">
  <h2>Roster</h2>
  <p>Add your players here</p>
</section>

</body>
</html>
