<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Stats | Wildflowers Softball</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: "Nunito", sans-serif;
  background: #fdf8f0;
  margin: 0;
}

nav {
  background: #1a3615;
  padding: 1rem;
}

nav a {
  color: white;
  margin-right: 15px;
  text-decoration: none;
  font-weight: bold;
}

h1 {
  text-align: center;
  font-family: "Playfair Display", serif;
  color: #2d5a27;
}

.container {
  width: 95%;
  margin: auto;
}

/* SEARCH */
.search-box {
  margin: 20px 0;
  text-align: center;
}

.search-box input {
  padding: 10px;
  width: 250px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  text-align: center;
}

th {
  background: #2d5a27;
  color: white;
  cursor: pointer;
}

tr:nth-child(even) {
  background: #f4f4f4;
}

/* LEADER CARDS */
.leaders {
  display: flex;
  justify-content: space-around;
  margin: 20px 0;
  flex-wrap: wrap;
}

.card {
  background: #e8c97a;
  padding: 15px;
  border-radius: 10px;
  margin: 10px;
  text-align: center;
  min-width: 120px;
  font-weight: bold;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="stats.html">Stats</a>
</nav>

<h1>🌸 Wildflowers Team Stats</h1>

<div class="container">

  <!-- LEADERS -->
  <div class="leaders" id="leaders"></div>

  <!-- SEARCH -->
  <div class="search-box">
    <input type="text" id="search" placeholder="Search player...">
  </div>

  <!-- TABLE -->
  <table id="statsTable">
    <thead>
      <tr>
        <th onclick="sortTable('name')">Player</th>
        <th onclick="sortTable('AB')">AB</th>
        <th onclick="sortTable('H')">H</th>
        <th onclick="sortTable('BB')">BB</th>
        <th onclick="sortTable('AVG')">AVG</th>
        <th onclick="sortTable('OBP')">OBP</th>
        <th onclick="sortTable('SLG')">SLG</th>
        <th onclick="sortTable('OPS')">OPS</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script src="stats.js"></script>

</body>
</html>
